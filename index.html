<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Spatial-Trust WebAR Prototype</title>
  <link rel="icon" href="data:,">

  <style>
    :root {
      --bg-0: #06070a;
      --bg-1: #0f1b2e;
      --accent: #f6d365;
      --text: #f4f7ff;
      --muted: #a8b4cc;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: "Space Grotesk", "Segoe UI", Tahoma, sans-serif;
    }

    a-scene {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 0;
    }

    video#arjs-video {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: 0 !important;
      pointer-events: none !important;
    }

    /* Detection overlay canvas */
    canvas#detection-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 100;
      cursor: crosshair;
      pointer-events: none;
      background: transparent;
      display: block;
    }

    a-scene canvas {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      background: transparent !important;
      z-index: 1 !important;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 25%, rgba(246, 211, 101, 0.2), transparent 40%),
        radial-gradient(circle at 82% 78%, rgba(48, 92, 173, 0.25), transparent 42%),
        linear-gradient(145deg, var(--bg-0), var(--bg-1));
      transition: opacity 320ms ease, visibility 320ms ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #status-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(6, 7, 10, 0.9);
      border: 2px solid rgba(246, 211, 101, 0.4);
      border-radius: 12px;
      padding: 16px;
      z-index: 50;
      max-width: 380px;
      font-family: "Space Grotesk", "Courier New", monospace;
      font-size: 12px;
      color: var(--text);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
      padding: 4px 0;
      align-items: center;
    }

    .status-label {
      color: var(--muted);
      font-weight: 600;
    }

    .status-value {
      color: var(--accent);
      font-weight: 700;
      font-family: "Courier New", monospace;
    }

    .status-value.success {
      color: #2add84;
    }

    .status-value.error {
      color: #ff2f3d;
    }

    .status-value.warning {
      color: #ffd43b;
    }

    #marker-detection-event {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(42, 221, 132, 0.95);
      color: #000;
      padding: 40px 60px;
      border-radius: 16px;
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      z-index: 100;
      display: none;
      box-shadow: 0 20px 60px rgba(42, 221, 132, 0.4);
      animation: popIn 0.4s ease;
    }

    #marker-detection-event.show {
      display: block;
    }

    #marker-detection-event.lost {
      background: rgba(255, 47, 61, 0.95);
      animation: popOut 0.4s ease;
    }

    @keyframes popIn {
      from {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 0;
      }
      to {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }

    @keyframes popOut {
      from {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      to {
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 0;
      }
    }

    @keyframes popOutRed {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
        background: rgba(255, 47, 61, 0.95);
      }
      100% {
        transform: translate(-50%, -50%) scale(0.7);
        opacity: 0;
        background: rgba(255, 47, 61, 0.2);
      }
    }

    .loading-card {
      width: min(90vw, 420px);
      padding: 28px 24px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(6, 10, 19, 0.74);
      backdrop-filter: blur(8px);
      text-align: left;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }

    .kicker {
      margin: 0;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
    }

    h1 {
      margin: 10px 0 8px;
      font-size: clamp(22px, 4.3vw, 30px);
      line-height: 1.2;
      font-weight: 700;
    }

    .status {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      min-height: 2.9em;
    }

    .spinner {
      width: 24px;
      height: 24px;
      margin: 18px 0 0;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.26);
      border-top-color: #fff;
      animation: spin 0.9s linear infinite;
    }

    .loading-card.error {
      border-color: rgba(255, 95, 109, 0.65);
      box-shadow: 0 14px 36px rgba(255, 47, 61, 0.2);
    }

    .loading-card.error .spinner {
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar-nft.js"></script>
  <script>
    if (window.AFRAME && !AFRAME.components.billboard) {
      // Keep labels oriented toward the active camera.
      AFRAME.registerComponent("billboard", {
        init: function () {
          this.worldCameraPosition = new THREE.Vector3();
          this.localCameraPosition = new THREE.Vector3();
        },
        tick: function () {
          const sceneCamera = this.el.sceneEl && this.el.sceneEl.camera;
          const parent = this.el.object3D.parent;
          if (!sceneCamera || !parent) {
            return;
          }

          sceneCamera.getWorldPosition(this.worldCameraPosition);
          this.localCameraPosition.copy(this.worldCameraPosition);
          parent.worldToLocal(this.localCameraPosition);
          this.el.object3D.lookAt(this.localCameraPosition);
        }
      });
    }
  </script>
</head>
<body>
  <div id="loading-screen" role="status" aria-live="polite">
    <div class="loading-card">
      <p class="kicker">Spatial-Trust</p>
      <h1>Initializing camera and tracker</h1>
      <p id="loading-status" class="status">Allow camera permission when prompted, then point at the printed article.</p>
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </div>

  <!-- Detection highlight canvas overlay -->
  <canvas id="detection-canvas"></canvas>

  <div id="status-panel" style="display: none;">
    <div style="font-weight: 700; color: var(--accent); margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;">
      📊 System Status
    </div>
    <div class="status-row">
      <span class="status-label">Camera:</span>
      <span class="status-value" id="camera-status">⏳ Initializing</span>
    </div>
    <div class="status-row">
      <span class="status-label">Marker:</span>
      <span class="status-value" id="marker-status">⏳ Loading</span>
    </div>
    <div class="status-row">
      <span class="status-label">Detection:</span>
      <span class="status-value" id="detection-status">⏳ Idle</span>
    </div>
    <div class="status-row">
      <span class="status-label">Confidence:</span>
      <span class="status-value" id="confidence-status">0%</span>
    </div>
    <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 11px; color: var(--muted);">
      <div id="last-event">Ready for marker detection</div>
      <div id="fps-display" style="margin-top: 4px;">FPS: 0</div>
    </div>
  </div>

  <div id="marker-detection-event"></div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true; colorManagement: true"
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; cameraResolution: [1280, 960];"
  >
    <a-nft
      id="article-marker"
      type="nft"
      url="http://127.0.0.1:5500/markers/article"
      smooth="true"
      smooth-count="10"
      smooth-tolerance="0.01"
      smooth-threshold="5"
      arjs-anchor="minConfidence: 0.2"
      emitevents="true"
    >
      <a-entity position="-120 120 -60" rotation="90 0 180">
        <a-plane
          width="220"
          height="66"
          material="shader: flat; color: #ff2f3d; opacity: 0.94; transparent: true; side: double; depthTest: false; depthWrite: false"
          animation__pulse="property: scale; from: 1 1 1; to: 1.08 1.08 1; dir: alternate; dur: 820; loop: true; easing: easeInOutSine"
        ></a-plane>
        <a-text
          value="[ WARNING: DEEPFAKE SIGNATURE DETECTED ]"
          color="#ffffff"
          align="center"
          width="4.5"
          position="0 18 0"
          scale="4 4 4"
          billboard
        ></a-text>
      </a-entity>

      <a-entity position="0 10 -60" rotation="90 0 180">
        <a-plane
          width="280"
          height="58"
          material="shader: flat; color: #2add84; opacity: 0.94; transparent: true; side: double; depthTest: false; depthWrite: false"
        ></a-plane>
        <a-text
          value="[ VERIFIED: HUMAN ORIGIN ]"
          color="#eafff3"
          align="center"
          width="4.5"
          position="0 16 0"
          scale="4 4 4"
          billboard
        ></a-text>
      </a-entity>

      <a-entity position="0 -120 -60" rotation="90 0 180">
        <a-plane
          width="280"
          height="58"
          material="shader: flat; color: #ffd43b; opacity: 0.94; transparent: true; side: double; depthTest: false; depthWrite: false"
          animation__glow="property: material.opacity; from: 0.55; to: 1.0; dir: alternate; dur: 760; loop: true; easing: easeInOutSine"
        ></a-plane>
        <a-text
          value="[ ALERT: HIGH AI-PERPLEXITY SCORE ]"
          color="#fff1a8"
          align="center"
          width="4.5"
          position="0 16 0"
          scale="4 4 4"
          billboard
        ></a-text>
      </a-entity>

      <!-- LARGE BRIGHT DETECTION OVERLAY - HIGHLY VISIBLE -->
      <a-plane
        id="detection-highlight"
        position="0 0 -60"
        rotation="90 0 0"
        width="500"
        height="320"
        material="shader: flat; color: #00ff00; opacity: 0.35; transparent: true; side: double; depthTest: false; depthWrite: false"
        visible="false"
        class="detection-overlay"
      ></a-plane>

      <!-- LARGE RED OVERLAY FOR AI DETECTION -->
      <a-plane
        id="detection-highlight-red"
        position="0 0 -60"
        rotation="90 0 0"
        width="500"
        height="320"
        material="shader: flat; color: #ff0000; opacity: 0.35; transparent: true; side: double; depthTest: false; depthWrite: false"
        visible="false"
        class="detection-overlay"
      ></a-plane>
    </a-nft>

    <a-entity id="camera" camera></a-entity>
  </a-scene>

  <script>
    (function () {
      const loadingScreen = document.getElementById("loading-screen");
      const loadingCard = loadingScreen.querySelector(".loading-card");
      const statusText = document.getElementById("loading-status");
      const scene = document.querySelector("a-scene");
      let marker = document.getElementById("article-marker");  // Static marker is already in the DOM.
      const markerSuffixes = [".fset", ".fset3", ".iset"];
      let loadingHidden = false;
      let cameraReady = false;
      let cameraErrored = false;
      let markerAssetsReady = null;
      let feedProbe = null;
      let observedFeed = null;
      let feedPlayRequested = false;

      function setStatus(message) {
        statusText.textContent = message;
      }

      function updateStatusPanel(fieldId, value, type) {
        const el = document.getElementById(fieldId);
        if (el) {
          el.textContent = value;
          el.className = "status-value " + (type || "");
        }
      }

      function showMarkerDetectionEvent(message, isLost) {
        const popup = document.getElementById("marker-detection-event");
        if (!popup) return;
        
        popup.textContent = message;
        popup.className = "marker-event-popup " + (isLost ? "lost" : "found");
        popup.style.display = "block";
        
        // Play animation and auto-hide after 2 seconds
        setTimeout(() => {
          popup.style.animation = "none";
          void popup.offsetWidth; // Trigger reflow
          popup.style.animation = isLost ? "popOutRed 0.6s ease" : "popIn 0.4s ease";
        }, 100);
        
        setTimeout(() => {
          popup.style.display = "none";
        }, 2500);
      }

      function hideLoading() {
        if (loadingHidden) {
          return;
        }
        loadingHidden = true;
        loadingScreen.classList.add("hidden");
      }

      function markCameraReady(message) {
        if (cameraReady || cameraErrored) {
          return;
        }

        cameraReady = true;
        
        // Update status panel
        updateStatusPanel("camera-status", "✅ Ready", "success");
        
        if (markerAssetsReady === false) {
          setStatus("Camera ready, but marker files are missing. Add NFT files and redeploy.");
          return;
        }

        if (markerAssetsReady === true) {
          setStatus(message || "Camera ready. Point at the article marker to start verification.");
        } else {
          setStatus("Camera ready. Verifying marker assets...");
        }

        hideLoading();
      }

      function markCameraError(message) {
        if (cameraReady || cameraErrored) {
          return;
        }

        cameraErrored = true;
        loadingCard.classList.add("error");
        setStatus(message || "Camera access failed. Open over HTTPS and allow camera permission.");
      }

      function markMarkerError(message) {
        markerAssetsReady = false;
        loadingCard.classList.add("error");
        setStatus(message);

        if (cameraReady && !cameraErrored) {
          hideLoading();
        }
      }

      function markMarkerReady() {
        markerAssetsReady = true;
        if (cameraReady && !cameraErrored) {
          setStatus("Camera and marker assets ready. Point at the printed article.");
          hideLoading();
          
          // Show status panel with initial values
          const statusPanel = document.getElementById("status-panel");
          if (statusPanel) {
            statusPanel.style.display = "block";
            updateStatusPanel("camera-status", "✅ Ready", "success");
            updateStatusPanel("marker-status", "✅ Loaded", "success");
            updateStatusPanel("detection-status", "⏳ Waiting", "");
            updateStatusPanel("last-event", "Ready to detect marker...");
          }
        }
      }

      function syncCameraLayerVisibility() {
        const html = document.documentElement;
        if (html) {
          html.style.width = "100%";
          html.style.height = "100%";
          html.style.overflow = "hidden";
          html.style.background = "#000";
        }

        const body = document.body;
        if (body) {
          body.style.position = "fixed";
          body.style.inset = "0";
          body.style.width = "100vw";
          body.style.height = "100vh";
          body.style.margin = "0";
          body.style.overflow = "hidden";
          body.style.background = "#000";
        }

        const renderer = scene && scene.renderer;
        if (renderer && typeof renderer.setClearColor === "function") {
          renderer.setClearColor(new THREE.Color(0x000000), 0);
          if (typeof renderer.setClearAlpha === "function") {
            renderer.setClearAlpha(0);
          }
          if (typeof renderer.setPixelRatio === "function") {
            renderer.setPixelRatio(window.devicePixelRatio || 1);
          }
          if (typeof renderer.setSize === "function") {
            renderer.setSize(window.innerWidth, window.innerHeight, false);
          }
        }

        const canvas = renderer && renderer.domElement;
        if (canvas) {
          canvas.style.position = "fixed";
          canvas.style.inset = "0";
          canvas.style.width = "100vw";
          canvas.style.height = "100vh";
          canvas.style.background = "transparent";
          canvas.style.zIndex = "1";
        }

        const feed = document.getElementById("arjs-video");
        if (feed) {
          feed.style.position = "fixed";
          feed.style.inset = "0";
          feed.style.width = "100vw";
          feed.style.height = "100vh";
          feed.style.objectFit = "cover";
          feed.style.zIndex = "0";
          feed.style.pointerEvents = "none";
        }
      }

      window.addEventListener("resize", function () {
        syncCameraLayerVisibility();
      });

      function resolveMarkerUrl() {
        const params = new URLSearchParams(window.location.search);
        const override = params.get("marker");
        if (override) {
          if (override.startsWith("http://") || override.startsWith("https://")) {
            console.log("Using absolute marker override:", override);
            return override;
          } else if (override.startsWith("/")) {
            // Root-absolute: resolve to full URL for worker compatibility
            console.log("Using root-absolute marker override, resolving to full URL:", override);
            return location.origin + override;
          } else {
            console.log("Using relative marker override:", override);
            return new URL(override, window.location.href).href;
          }
        }

        // AR.js worker XMLHttpRequest requires full absolute URLs with protocol and origin.
        // Root-absolute paths don't work reliably in worker context.
        const absoluteUrl = location.origin + "/markers/article";
        console.log("Resolved absolute marker URL:", absoluteUrl);
        console.log("  origin:", location.origin);
        console.log("  href:", location.href);
        return absoluteUrl;
      }

      async function verifyMarkerAssets(markerBaseUrl) {
        const checks = [];

        for (const suffix of markerSuffixes) {
          const assetUrl = markerBaseUrl + suffix;
          try {
            let response = await fetch(assetUrl, { method: "HEAD", cache: "no-store" });

            // Some static servers don't support HEAD. Fall back once to GET.
            if (response.status === 405) {
              response = await fetch(assetUrl, { method: "GET", cache: "no-store" });
            }

            const check = { assetUrl: assetUrl, ok: response.ok, status: response.status };
            checks.push(check);
            console.log("Marker asset check:", assetUrl, "->", response.status);

            if (!check.ok) {
              break;
            }
          } catch (error) {
            checks.push({ assetUrl: assetUrl, ok: false, status: 0, error: error });
            console.error("Marker asset fetch error:", assetUrl, error);
            break;
          }
        }

        return checks;
      }

      async function initMarkerAssetsLegacy() {
        const markerUrl = resolveMarkerUrl();
        console.log("1. Resolved marker base URL:", markerUrl);
        setStatus("Checking marker files...");

        const markerElement = document.getElementById("article-marker");
        if (!markerElement) {
          markMarkerError("Marker element missing from the page.");
          return;
        }

        console.log("✓ Marker element found:", markerElement.tagName, markerElement.id);
        
        marker = markerElement;
        attachMarkerEventListeners(markerElement);
        
        // Add console logging to verify event attachment
        console.log("✓ Event listeners attached to marker element");

        window.addEventListener("arjs-nft-loaded", function () {
          console.log("✓✓✓ arjs-nft-loaded global event fired! Marker fully loaded! ✓✓✓");
          markMarkerReady();
        }, { once: true });

        window.addEventListener("arjs-nft-error", function (event) {
          console.error("★ arjs-nft-error event fired!");
          console.error("  Error:", event.detail);
        }, { once: true });

        const checks = await verifyMarkerAssets(markerUrl);
        const failed = checks.filter(function (item) {
          return !item.ok;
        });

        if (failed.length > 0) {
          const statusInfo = failed[0].status ? "HTTP " + failed[0].status : "network error";
          markMarkerError(
            "Marker load failed (" + statusInfo + "). Ensure article.fset, article.fset3, and article.iset exist in markers/ on GitHub Pages."
          );
          console.error("Missing marker assets:", failed.map(function (item) { return item.assetUrl; }));
          return;
        }

        console.log("2. Preflight checks passed.");
        console.log("3. Recreating marker element with URL attribute set...");
        
        try {
          // Remove the existing marker element
          const oldMarker = document.getElementById("article-marker");
          if (oldMarker) {
            console.log("   Removing old marker element");
            oldMarker.parentNode.removeChild(oldMarker);
          }
          
          // Create new marker element
          // <a-nft> is a custom element provided by AR.js
          const newMarker = document.createElement("a-nft");
          newMarker.id = "article-marker";
          
          // Set attributes using KEBAB-CASE (not camelCase)
          // AR.js a-nft element expects kebab-case HTML attributes
          console.log("   Setting a-nft attributes (kebab-case)...");
          
          newMarker.setAttribute("type", "nft");           // Required for AR.js
          newMarker.setAttribute("url", markerUrl);         // CRITICAL: URL without file extensions
          newMarker.setAttribute("smooth", "true");         // Enable smoothing
          newMarker.setAttribute("smooth-count", "10");     // Was: smoothCount (WRONG)
          newMarker.setAttribute("smooth-tolerance", "0.01"); // Was: smoothTolerance (WRONG)
          newMarker.setAttribute("smooth-threshold", "5");  // Was: smoothThreshold (WRONG)
          newMarker.setAttribute("emitevents", "true");     // Enable markerFound/Lost events
          newMarker.setAttribute("arjs-anchor", "minConfidence: 0.2");
          
          console.log("   ✓ All attributes set:");
          console.log("     type=", newMarker.getAttribute("type"));
          console.log("     url=", newMarker.getAttribute("url"));
          console.log("     smooth=", newMarker.getAttribute("smooth"));
          console.log("     smooth-count=", newMarker.getAttribute("smooth-count"));
          console.log("     emitevents=", newMarker.getAttribute("emitevents"));          
          // Debug: Log all attributes on the element
          console.log("   All element attributes:");
          for (let i = 0; i < newMarker.attributes.length; i++) {
            const attr = newMarker.attributes[i];
            console.log("     " + attr.name + "=" + attr.value);
          }          
          // Recreate the child overlay entities
          const overlays = [
            { position: "-120 120 -60", width: "220", height: "66", color: "#ff2f3d", text: "[ WARNING: DEEPFAKE SIGNATURE DETECTED ]", textColor: "#ffffff", textPos: "0 18 0" },
            { position: "0 10 -60", width: "280", height: "58", color: "#2add84", text: "[ VERIFIED: HUMAN ORIGIN ]", textColor: "#eafff3", textPos: "0 16 0" },
            { position: "0 -120 -60", width: "280", height: "58", color: "#ffd43b", text: "[ ALERT: HIGH AI-PERPLEXITY SCORE ]", textColor: "#fff1a8", textPos: "0 16 0", hasGlow: true }
          ];
          
          overlays.forEach(function(overlay) {
            const entity = document.createElement("a-entity");
            entity.setAttribute("position", overlay.position);
            entity.setAttribute("rotation", "90 0 180");
            
            const plane = document.createElement("a-plane");
            plane.setAttribute("width", overlay.width);
            plane.setAttribute("height", overlay.height);
            plane.setAttribute("material", "shader: flat; color: " + overlay.color + "; opacity: " + (overlay.hasGlow ? "0.88" : "0.94") + "; transparent: true; side: double; depthTest: false; depthWrite: false");
            if (overlay.hasGlow) {
              plane.setAttribute("animation__glow", "property: material.opacity; from: 0.55; to: 1.0; dir: alternate; dur: 760; loop: true; easing: easeInOutSine");
            } else if (overlay.position === "-120 120 -60") {

      function initializeDetectionCanvas() {

      function startDetectionLoop() {
        if (!videoElement || !detectionCtx || isAnalyzing) return;
        
        function analyzeFrame() {
          if (!videoElement || videoElement.paused) {
            requestAnimationFrame(analyzeFrame);
            return;
          }

          try {
            // Performance optimization: only analyze every Nth frame
            frameCount++;
            const shouldAnalyze = (frameCount % ANALYSIS_INTERVAL) === 0;
            
            // Get video dimensions
            const videoWidth = videoElement.videoWidth || 1280;
            const videoHeight = videoElement.videoHeight || 960;
            const canvasWidth = detectionCanvas.width;
            const canvasHeight = detectionCanvas.height;

            // Always clear and redraw for smooth animation
            detectionCtx.clearRect(0, 0, detectionCanvas.width, detectionCanvas.height);

            if (shouldAnalyze) {
              // Heavy computation: only every 3rd frame
              // Use cached canvas for edge detection
              cachedEdgeCanvas.width = Math.floor(videoWidth / 6);  // 1/6 resolution for speed (was 1/4)
              cachedEdgeCanvas.height = Math.floor(videoHeight / 6);
              cachedEdgeCtx.drawImage(videoElement, 0, 0, cachedEdgeCanvas.width, cachedEdgeCanvas.height);

              const edgeData = cachedEdgeCtx.getImageData(0, 0, cachedEdgeCanvas.width, cachedEdgeCanvas.height);
              const edges = edgeData.data;

              // Detect regions
              lastRegions = detectHighContrastRegions(edges, cachedEdgeCanvas.width, cachedEdgeCanvas.height);
              console.log("⏱️ Frame", frameCount, "analyzed (every", ANALYSIS_INTERVAL, 'frames)');
            }
            
            // Draw with cached regions (runs every frame for smooth rendering)
            let regions = lastRegions;
            
            // Draw detection boxes on main canvas
            let boxCount = 0;
            let drawnBoxes = 0;
            let skippedBoxes = [];
            
            // Calculate scale factors once (needed for final log)
            const scaleX = canvasWidth / videoWidth;
            const scaleY = canvasHeight / videoHeight;
            
            regions.forEach((region, idx) => {
              boxCount++;
              
              // Scale from 1/6 resolution back to canvas dimensions
              const x = region.x * 6 * scaleX;
              const y = region.y * 6 * scaleY;
              const w = region.width * 6 * scaleX;
              const h = region.height * 6 * scaleY;

              // Only draw if visible on canvas
              if (x + w > 0 && x < canvasWidth && y + h > 0 && y < canvasHeight && w > 2 && h > 2) {
                // Improved confidence scoring: based on cell count and average activity
                const cellCount = (region.width / 12) * (region.height / 12);
                const confidence = Math.min(100, Math.round(region.avgActivity / 0.84 * 10)); // Normalized to 0-100
                const isAI = confidence < 50;  // More balanced: 50-50 split
                
                const boxColor = isAI ? "rgba(255, 0, 0, 0.25)" : "rgba(0, 255, 0, 0.25)";
                const borderColor = isAI ? "#ff4444" : "#44ff44";
                const label = isAI ? "🤖" : "✓";

                // Draw filled semi-transparent box
                detectionCtx.fillStyle = boxColor;
                detectionCtx.fillRect(x, y, w, h);

                // Draw bright border (thicker for confidence)
                detectionCtx.strokeStyle = borderColor;
                detectionCtx.lineWidth = Math.max(2, confidence / 25);  // Thicker border = higher confidence
                detectionCtx.strokeRect(x, y, w, h);

                // Draw label with confidence
                if (w > 30 && h > 20) {
                  detectionCtx.fillStyle = borderColor;
                  detectionCtx.font = "bold 12px Arial";
                  detectionCtx.fillText(label, x + 4, y + 14);
                  
                  // Draw confidence percentage
                  detectionCtx.font = "9px Arial";
                  detectionCtx.fillText(confidence + "%", x + 4, y + 26);
                }

                drawnBoxes++;
              } else {
                skippedBoxes.push({ reason: "off-canvas", size: Math.round(w) + "x" + Math.round(h) });
              }
            });
            
            if (regions.length > 0) {
              console.log("🎨 Canvas render: " + drawnBoxes + "/" + boxCount + " boxes drawn | scale(x:" + scaleX.toFixed(3) + " y:" + scaleY.toFixed(3) + ") | canvas:" + canvasWidth + "x" + canvasHeight + " video:" + videoWidth + "x" + videoHeight);
            }

          } catch (error) {
            console.error("Detection error:", error);
          }

          requestAnimationFrame(analyzeFrame);
        }

        analyzeFrame();

      function removeOverlappingRegions(regions) {
        if (regions.length <= 1) return regions;

        // Sort by area (larger first)
        const sorted = regions.sort((a, b) => (b.width * b.height) - (a.width * a.height));
        const kept = [];

        for (const region of sorted) {
          let overlaps = false;

          for (const kept_region of kept) {
            // Check if regions overlap
            if (
              region.x < kept_region.x + kept_region.width &&
              region.x + region.width > kept_region.x &&
              region.y < kept_region.y + kept_region.height &&
              region.y + region.height > kept_region.y
            ) {
              overlaps = true;
              break;
            }
          }

          if (!overlaps) {
            kept.push(region);
          }
        }

        return kept;
      }

      function detectHighContrastRegions(imageData, width, height) {
        // Performance-optimized: larger grid cells = fewer calculations
        const GRID_SIZE = 16;  // Increased from 12 for faster computation (was 12×12, now 16×16)
        const grid = [];
        const activities = [];
        let activeCount = 0;
        
        // Create activity grid - measure local variance
        for (let y = 0; y < height - GRID_SIZE; y += GRID_SIZE) {
          for (let x = 0; x < width - GRID_SIZE; x += GRID_SIZE) {
            let sum = 0;
            let sumSq = 0;
            let count = 0;

            // Sample pixels in grid cell
            for (let py = 0; py < GRID_SIZE; py++) {
              for (let px = 0; px < GRID_SIZE; px++) {
                const idx = ((y + py) * width + (x + px)) * 4;
                const r = imageData[idx];
                const g = imageData[idx + 1];
                const b = imageData[idx + 2];
                const brightness = (r + g + b) / 3;
                
                sum += brightness;
                sumSq += brightness * brightness;
                count++;
              }
            }

            const mean = sum / count;
            const variance = (sumSq / count) - (mean * mean);
            const activity = Math.sqrt(Math.max(0, variance));
            
            activities.push(activity);

            grid.push({
              x: x,
              y: y,
              activity: activity,
              active: false  // Will be set after threshold calculation
            });
          }
        }

        // Calculate dynamic threshold for optimal F1 score
        activities.sort((a, b) => b - a);
        const max = activities[0] || 1;
        
        // Find non-zero activities (ignore dead background)
        const nonZeroActivities = activities.filter(a => a > 0.01);
        
        // Use percentiles optimized for balanced precision/recall
        let p50_live = 1;
        let p75_live = 1;
        if (nonZeroActivities.length > 0) {
          const p50Idx = Math.floor(nonZeroActivities.length * 0.50);  // Median of live cells
          const p75Idx = Math.floor(nonZeroActivities.length * 0.25);  // Top 25% of live cells
          p50_live = nonZeroActivities[p50Idx] || 1;
          p75_live = nonZeroActivities[p75Idx] || 1;
        }
        
        // Lower threshold = higher recall (catch more content)
        // 60% of 75th percentile → balanced F1 (better than 90% of 80th)
        const threshold = Math.max(1, p75_live * 0.60);
        
        // Mark truly active cells
        for (let i = 0; i < grid.length; i++) {
          if (grid[i].activity > threshold) {
            grid[i].active = true;
            activeCount++;
          }
        }

        console.log("📊 F1-optimized: live=" + nonZeroActivities.length + "/" + activities.length + " | p50=" + p50_live.toFixed(1) + " p75=" + p75_live.toFixed(1) + " threshold=" + threshold.toFixed(1) + " → " + activeCount + " cells");

        // Dilate: expand active regions
        const dilated = new Uint8Array(grid.length);
        const cols = Math.floor(width / GRID_SIZE);
        const rows = Math.floor(height / GRID_SIZE);
        let dilateAddCount = 0;

        for (let i = 0; i < grid.length; i++) {
          if (grid[i].active) {
            dilated[i] = 1;
          } else {
            // Improved dilation: expand regions strategically
            // Check if surrounded by sufficient activity for gap-filling
            let activeNeighbors = 0;
            const x = i % cols;
            const y = Math.floor(i / cols);
            
            // Count 4-connected active neighbors
            if (x > 0 && i - 1 < grid.length && grid[i - 1] && grid[i - 1].active) activeNeighbors++;
            if (x < cols - 1 && i + 1 < grid.length && grid[i + 1] && grid[i + 1].active) activeNeighbors++;
            if (y > 0 && i - cols >= 0 && grid[i - cols] && grid[i - cols].active) activeNeighbors++;
            if (y < rows - 1 && i + cols < grid.length && grid[i + cols] && grid[i + cols].active) activeNeighbors++;
            
            // Only expand small gaps (2+ neighbors) to prevent merging distant regions
            if (activeNeighbors >= 2) {
              dilated[i] = 1;
              dilateAddCount++;
            }
          }
        }

        console.log("🔧 Dilation: +", dilateAddCount, "gap cells (2+ neighbor requirement)");

        // Extract bounding boxes from dilated regions with improved filtering
        const visited = new Uint8Array(grid.length);
        const regions = [];
        let regionCount = 0;
        let filteredCount = 0;

        for (let i = 0; i < dilated.length; i++) {
          if (dilated[i] && !visited[i]) {
            const region = floodFillGrid(dilated, visited, i, cols, rows, grid);
            if (region) {
              regionCount++;
              // Filter: must be at least 20 pixels (smaller threshold for lower resolution)
              // Activity-based confidence: higher activity = more likely real content
              if (region.width >= 20 && region.height >= 20 && region.avgActivity > threshold * 0.4) {
                regions.push(region);
                const cellCount = (region.width / GRID_SIZE) * (region.height / GRID_SIZE);
                console.log("✓ Region #" + regions.length + ": " + region.width + "x" + region.height + "px (" + cellCount.toFixed(1) + " cells) @(" + region.x + "," + region.y + ") activity=" + region.avgActivity.toFixed(1));
              } else {
                filteredCount++;
              }
            }
          }
        }

        console.log("📦 Regions: detected=" + regionCount + " accepted=" + regions.length + " rejected=" + filteredCount);
        return regions;
      }

      function floodFillGrid(grid, visited, startIdx, cols, rows, gridCells) {
        const stack = [startIdx];
        let minX = startIdx % cols;
        let maxX = minX;
        let minY = Math.floor(startIdx / cols);
        let maxY = minY;
        let count = 0;
        let totalActivity = 0;

        while (stack.length > 0) {
          const idx = stack.pop();
          if (visited[idx]) continue;
          if (!grid[idx]) continue;

          visited[idx] = 1;
          count++;
          
          // Track average activity of cells in this region
          if (gridCells && gridCells[idx]) {
            totalActivity += gridCells[idx].activity || 0;
          }

          const x = idx % cols;
          const y = Math.floor(idx / cols);
          minX = Math.min(minX, x);
          maxX = Math.max(maxX, x);
          minY = Math.min(minY, y);
          maxY = Math.max(maxY, y);

          // Add 4-connected neighbors
          if (x > 0) stack.push(idx - 1);
          if (x < cols - 1) stack.push(idx + 1);
          if (y > 0) stack.push(idx - cols);
          if (y < rows - 1) stack.push(idx + cols);
        }

        if (count === 0) return null;

        return {
          x: minX * GRID_SIZE,
          y: minY * GRID_SIZE,
          width: (maxX - minX + 1) * GRID_SIZE,
          height: (maxY - minY + 1) * GRID_SIZE,
          confidence: Math.min(100, count * 2),
          avgActivity: totalActivity / count
        };
      }

      function normalizeWorkerRelativeUrl(url) {
        if (typeof url !== "string") {
          return url;
        }

        try {
          const parsedUrl = new URL(url, window.location.href);
          if (parsedUrl.origin === window.location.origin) {
            return parsedUrl.pathname.replace(/^\/+/, "") + parsedUrl.search + parsedUrl.hash;
          }
        } catch (error) {
          return url;
        }

        return url;
      }
      
      // Intercept Worker creation to log when workers are created
      const originalWorker = window.Worker;
      let workerCount = 0;
      window.Worker = function(scriptURL) {
        console.log("★ NEW WORKER CREATED #" + (++workerCount) + ", scriptURL:", scriptURL);
        const worker = new originalWorker(scriptURL);
        
        // Wrap postMessage to log what's being sent to the worker
        const originalPostMessage = worker.postMessage.bind(worker);
        worker.postMessage = function(msg) {
          if (msg && msg.type === "init" && typeof msg.marker === "string") {
            const normalizedMarker = normalizeWorkerRelativeUrl(msg.marker);
            if (normalizedMarker !== msg.marker) {
              console.log("☆ Normalizing worker marker URL:", msg.marker, "->", normalizedMarker);
              msg = Object.assign({}, msg, { marker: normalizedMarker });
            }
          }
          // Only log init and important events, not every frame (process msgs are 60fps spam)
          if (msg.type !== "process") {
            console.log("☆ Posting to worker:", msg.type, msg.marker || msg);
          }
          return originalPostMessage(msg);
        };
        
        // Listen for worker messages to see what happens
        worker.onmessage = function(ev) {
          if (ev.data && ev.data.type === "endLoading") {
            console.log("🎉 Worker endLoading:", ev.data);
          } else if (ev.data && ev.data.type === "error") {
            console.error("❌ Worker error:", ev.data);
          } else {
            // console.log("Worker message:", ev.data?.type || ev.data);
          }
        };
        
        worker.onerror = function(err) {
          console.error("❌ Worker error event:", err.message, err.filename, err.lineno);
        };
        
        return worker;
      };
      
      // Intercept XMLHttpRequest to log what workers are trying to fetch
      const OriginalXHR = window.XMLHttpRequest;
      window.XMLHttpRequest = function() {
        const xhr = new OriginalXHR();
        const originalOpen = xhr.open;
        
        xhr.open = function(method, url, async, user, pass) {
          const logUrl = String(url);
          if (logUrl.includes('marker') || logUrl.includes('article') || logUrl.includes('fset') || logUrl.includes('iset')) {
            console.log("📡 XHR OPEN:", method, logUrl);
          }
          return originalOpen.apply(this, arguments);
        };
        
        const originalSend = xhr.send;
        xhr.send = function(data) {
          const self = this;
          xhr.addEventListener('readystatechange', function() {
            if (xhr.readyState === 4) {
              const requestUrl = arguments.callee.caller?.arguments?.[0] || 'unknown';
              if (self._url?.includes('marker') || self._url?.includes('article') || self._url?.includes('fset')) {
                console.log("📡 XHR DONE:", self._url, "status:", xhr.status);
              }
            }
          });
          return originalSend.apply(this, arguments);
        };
        
        return xhr;
      };

      // Trace marker entity lifecycle for debugging AR.js NFT loading.
      function attachMarkerEventListeners(markerElement) {
        console.log("Attaching event listeners to marker element");
        
        markerElement.addEventListener("componentinitialized", function (event) {
          console.log("✓ Component initialized:", event.detail.name);
          
          if (event.detail.name === "arjs-anchor") {
            console.log("  [arjs-anchor initialized]");
            const comp = event.target.components['arjs-anchor'];
            console.log("    data:", JSON.stringify(comp.data || {}));
            console.log("    data.url:", comp.data.url);
            console.log("    data.descriptorsUrl:", comp.data.descriptorsUrl);
          }
          
          if (event.detail.name === "nft" && markerElement.components.nft) {
            console.log("  [NFT component initialized!]");
            console.log("  NFT component data:", markerElement.components.nft.data);
          }
        });

        markerElement.addEventListener("componentchanged", function (event) {
          console.log("✓ Component changed:", event.detail.name);
          console.log("  newData:", JSON.stringify(event.detail.newData || {}));
          console.log("  oldData:", JSON.stringify(event.detail.oldData || {}));
        });
        
        markerElement.addEventListener("componentremoved", function (event) {
          console.log("! Component removed:", event.detail.name);
        });

        markerElement.addEventListener("error", function (event) {
          console.error("★ Marker error event:", event);
          if (event.detail) {
            console.error("  Error detail:", event.detail);
          }
        });
        
        // Listen for any marker-related events
        ["markerLoaded", "markerloaded", "loaded", "entityloaded"].forEach(function(eventName) {
          markerElement.addEventListener(eventName, function (event) {
            console.log("✓✓✓ MARKER EVENT:", eventName, "✓✓✓");
          });
        });

        markerElement.addEventListener("markerFound", function (event) {
          console.log("🟢🟢🟢 MARKERFOOUND EVENT FIRED 🟢🟢🟢");
          console.log("Event details:", event);
          console.log("Event target:", event.target);
          console.log("Event type:", event.type);
          
          console.log("★★★ MARKER FOUND - Tracking Active ★★★");
          setStatus("Marker locked. Spatial threat overlays are active.");
          
          // Update UI panel
          updateStatusPanel("detection", "🟢 FOUND", "success");
          updateStatusPanel("last-event", "Marker detected at: " + new Date().toLocaleTimeString());
          
          // Show big popup
          showMarkerDetectionEvent("MARKER DETECTED ✓", false);
          
          // Make overlay entities visible
          const overlays = markerElement.querySelectorAll("a-entity");
          console.log("Found overlay entities:", overlays.length);
          overlays.forEach((overlay, idx) => {
            overlay.setAttribute("visible", "true");
            console.log("Made overlay", idx, "visible");
          });
          
          // Show bright green detection highlight
          const greenHighlight = document.getElementById("detection-highlight");
          if (greenHighlight) {
            greenHighlight.setAttribute("visible", "true");
            console.log("✓ Green detection overlay SHOWN");
          } else {
            console.log("❌ Green detection overlay NOT FOUND");
          }
          
          // Show text labels too
          const labels = markerElement.querySelectorAll("a-text");
          console.log("Found text labels:", labels.length);
          labels.forEach((label, idx) => {
            label.setAttribute("visible", "true");
          });
        });

        markerElement.addEventListener("markerLost", function (event) {
          console.log("🔴🔴🔴 MARKERLOST EVENT FIRED 🔴🔴🔴");
          console.log("Event details:", event);
          
          console.log("★★★ MARKER LOST - Tracking Stopped ★★★");
          if (!cameraErrored) {
            setStatus("Marker lost. Re-frame the printed article.");
          }
          
          // Update UI panel
          updateStatusPanel("detection", "⏸ Tracking", "warning");
          updateStatusPanel("last-event", "Marker lost - waiting for re-detection");
          
          // Show lost popup
          showMarkerDetectionEvent("MARKER LOST ✗", true);
          
          // Hide overlay entities
          const overlays = markerElement.querySelectorAll("a-entity");
          console.log("Hiding overlay entities:", overlays.length);
          overlays.forEach((overlay, idx) => {
            overlay.setAttribute("visible", "false");
            console.log("Hid overlay", idx);
          });
          
          // Hide detection overlays
          const greenHighlight = document.getElementById("detection-highlight");
          const redHighlight = document.getElementById("detection-highlight-red");
          if (greenHighlight) greenHighlight.setAttribute("visible", "false");
          if (redHighlight) redHighlight.setAttribute("visible", "false");
          console.log("✓ Detection overlays HIDDEN");
          
          // Hide text labels
          const labels = markerElement.querySelectorAll("a-text");
          labels.forEach((label) => {
            label.setAttribute("visible", "false");
          });
        });
        
        // Watch for attribute mutations
        console.log("Setting up MutationObserver for attribute changes...");
        const observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'attributes') {
              console.log("  [Attribute changed]: " + mutation.attributeName + 
                         " = " + markerElement.getAttribute(mutation.attributeName));
            }
          });
        });
        
        observer.observe(markerElement, { attributes: true, attributeOldValue: true });
      }

      async function initMarkerAssets() {
        const markerUrl = resolveMarkerUrl();
        console.log("1. Resolved marker base URL:", markerUrl);
        setStatus("Checking marker files...");

        const checks = await verifyMarkerAssets(markerUrl);
        const failed = checks.filter(function (item) {
          return !item.ok;
        });

        if (failed.length > 0) {
          const statusInfo = failed[0].status ? "HTTP " + failed[0].status : "network error";
          markMarkerError(
            "Marker load failed (" + statusInfo + "). Ensure article.fset, article.fset3, and article.iset exist in markers/."
          );
          console.error("Missing marker assets:", failed.map(function (item) { return item.assetUrl; }));
          return;
        }

        console.log("2. Preflight checks passed.");

        setStatus("Marker files verified. Point the printed article at the camera.");
      }
      
    })();
  </script>
